<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <!-- Tailwind CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.16/dist/tailwind.min.css" rel="stylesheet">
  </head>

  <body class="bg-gray-100">

    <!-- Main container -->
    <div class="min-h-screen flex items-center justify-center">
      <div class="w-full max-w-md bg-white p-8 rounded-lg shadow-lg">
        <h2 class="text-2xl font-semibold text-center text-gray-700 mb-8">Create a New Account</h2>

        <!-- Registration form -->
        <form action="#" method="POST">
          <!-- Username Input -->
          <div class="mb-4">
            <label for="username" class="block text-gray-600 font-medium">Username</label>
            <input type="text" id="username" name="username"
              class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
              placeholder="Enter your username" required>
          </div>

          <!-- Email Input -->
          <div class="mb-4">
            <label for="email" class="block text-gray-600 font-medium">Email Address</label>
            <input type="email" id="email" name="email"
              class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
              placeholder="Enter your email" required>
          </div>

          <!-- Password Input -->
          <div class="mb-4">
            <label for="password" class="block text-gray-600 font-medium">Password</label>
            <input type="password" id="password" name="password"
              class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
              placeholder="Enter your password" required>
          </div>

          <!-- Confirm Password Input -->
          <div class="mb-6">
            <label for="confirm_password" class="block text-gray-600 font-medium">Confirm Password</label>
            <input type="password" id="confirm_password" name="confirm_password"
              class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
              placeholder="Confirm your password" required>
          </div>

          <!-- Agree to Terms Checkbox -->
          <div class="mb-6">
            <label for="agree" class="flex items-center text-gray-600">
              <input type="checkbox" id="agree" name="agree" class="mr-2">
              I agree to the <a href="#" class="text-blue-500 hover:underline">Terms and Conditions</a>
            </label>
          </div>

          <!-- Submit Button -->
          <button type="submit"
            class="w-full mt-6 p-3 bg-blue-500 text-white rounded-lg hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-500">Register</button>
        </form>

        <!-- Login Link -->
        <p class="mt-4 text-center text-gray-600">Already have an account? <a href="login.html"
            class="text-blue-500 hover:underline">Login</a></p>
      </div>
    </div>

  </body>

</html>
